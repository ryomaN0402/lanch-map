<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>神谷町グルメマップ</title>

<!-- Leaflet (地図ライブラリ / 無料・APIキー不要) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

<!-- =========================================================
     ★ 設定はここだけ ★
     1) CSV_URL … Googleスプレッドシートを「ウェブに公開(CSV)」したURL
     2) FORM_URL … 「お店を追加」ボタンから開くGoogleフォームのURL
     どちらも下の手順で取得して貼り付けてください。
     空のままだと、下のサンプルデータで表示されます（動作確認用）。
     ========================================================= -->
<script>
const CSV_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThmZqweEfqFTZs0Z8FrEpcfTxObjpxdoLdWq77mnuU-MkCUvDYOq77DQnb7zbl2f-GhAMSpNHOOhRp/pub?gid=1883553897&single=true&output=csv";   // 例: https://docs.google.com/spreadsheets/d/e/XXXX/pub?gid=0&single=true&output=csv
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSe-X8p2z_JgBws5-YAcp_zOEeCfD1zAx85aeiQIjJf-IRwSIQ/viewform";   // 例: https://forms.gle/XXXXXXXX

// ジャンルの色（ここに無いジャンルは自動で色が割り当てられます）
const GENRE_COLORS = {
  "ラーメン":"#C4553D", "和食":"#4E8D6E", "カレー":"#E0972C",
  "カフェ":"#B07A56", "洋食":"#3F6E9C", "中華":"#B23A48",
};
const PALETTE = ["#7A6CA8","#2F8F9D","#C77B9E","#5E8C3A","#B5652F","#4A72B0"];

// CSV未設定のときに表示されるサンプル
const SAMPLE_PLACES = [
  { name:"麺屋 こもれび", genre:"ラーメン", lat:35.6870, lng:139.7640, budget:"〜1000", walk:3, dish:"醤油そば", rating:4, status:"リピート", by:"佐藤", memo:"昼は行列。11:30前が狙い目。", url:"" },
  { name:"定食 あおば", genre:"和食", lat:35.6855, lng:139.7665, budget:"〜1000", walk:5, dish:"日替わり定食", rating:5, status:"リピート", by:"田中", memo:"ボリュームすごい。ご飯おかわり無料。", url:"" },
  { name:"スパイスラボ", genre:"カレー", lat:35.6885, lng:139.7625, budget:"〜1200", walk:6, dish:"2種盛りカレー", rating:4, status:"行きたい", by:"鈴木", memo:"辛さ選べる。テイクアウト可。", url:"" },
  { name:"Café Lumo", genre:"カフェ", lat:35.6848, lng:139.7630, budget:"〜1500", walk:4, dish:"キッシュランチ", rating:3, status:"リピート", by:"山本", memo:"静かで打ち合わせ向き。", url:"" },
  { name:"洋食 ポルト", genre:"洋食", lat:35.6875, lng:139.7680, budget:"〜1500", walk:8, dish:"オムライス", rating:4, status:"行きたい", by:"高橋", memo:"デミグラスが濃厚。", url:"" },
  { name:"大衆中華 福龍", genre:"中華", lat:35.6860, lng:139.7610, budget:"〜1000", walk:7, dish:"半チャンラーメン", rating:4, status:"リピート", by:"伊藤", memo:"安い・早い。混む。", url:"" },
];
</script>

<style>
  :root{
    --paper:#FBF8F1; --panel:#FFFFFF; --ink:#2A2621; --muted:#7A736A;
    --line:#EAE3D6; --accent:#F2B441; --accent-ink:#7A5410;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:"Zen Kaku Gothic New", system-ui, sans-serif;
    color:var(--ink); background:var(--paper);
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  h1,h2,h3{ font-family:"Zen Maru Gothic", system-ui, sans-serif; margin:0; }

  header{ padding:14px 16px 10px; border-bottom:1px solid var(--line); background:var(--panel); z-index:5; flex:0 0 auto; }
  .bar{ display:flex; align-items:center; gap:10px; justify-content:space-between; }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .brand h1{ font-size:20px; font-weight:700; letter-spacing:.02em; white-space:nowrap; }
  .brand .sub{ font-size:12px; color:var(--muted); margin-top:2px; }
  .actions{ display:flex; gap:8px; flex:0 0 auto; }
  .btn{ font:inherit; font-size:13px; font-weight:500; cursor:pointer; border-radius:9px;
    padding:8px 12px; border:1px solid var(--line); background:var(--panel); color:var(--ink);
    text-decoration:none; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn.primary{ background:var(--accent); border-color:var(--accent); color:#3A2A08; font-weight:700; }
  .btn:hover{ box-shadow:0 2px 6px rgba(42,38,33,.08); }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .controls{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:12px; }
  .search{ flex:1 1 200px; min-width:150px; display:flex; align-items:center; gap:8px;
    background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:8px 12px; }
  .search input{ border:0; background:transparent; outline:none; width:100%; font:inherit; color:var(--ink); }
  .search svg{ flex:0 0 auto; color:var(--muted); }

  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ font:inherit; font-size:13px; cursor:pointer; user-select:none; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); padding:6px 11px; border-radius:999px;
    display:inline-flex; align-items:center; gap:6px; transition:background .15s, border-color .15s, transform .05s; }
  .chip .dot{ width:9px; height:9px; border-radius:50%; }
  .chip[aria-pressed="true"]{ border-color:var(--ink); background:#2A2621; color:#fff; }
  .chip:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .chip:active{ transform:scale(.97); }

  .seg{ display:none; gap:4px; margin-top:12px; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:4px; }
  .seg button{ flex:1; font:inherit; font-weight:500; padding:8px; border:0; border-radius:7px; background:transparent; color:var(--muted); cursor:pointer; }
  .seg button[aria-pressed="true"]{ background:var(--panel); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.08); }

  main{ flex:1 1 auto; display:flex; min-height:0; }
  #list{ flex:0 0 380px; overflow-y:auto; padding:12px; background:var(--paper); border-right:1px solid var(--line); }
  .count{ font-size:12px; color:var(--muted); padding:2px 4px 10px; }
  #map{ flex:1 1 auto; min-height:0; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 13px; margin-bottom:10px;
    cursor:pointer; transition:border-color .15s, box-shadow .15s, transform .05s; }
  .card:hover{ box-shadow:0 3px 10px rgba(42,38,33,.07); }
  .card:active{ transform:scale(.995); }
  .card.selected{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(242,180,65,.28); }
  .card:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .card-top{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  .card h3{ font-size:16px; font-weight:700; }
  .stars{ font-size:13px; color:var(--accent-ink); letter-spacing:1px; white-space:nowrap; }
  .tags{ display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 6px; }
  .tag{ font-size:12px; padding:2px 9px; border-radius:999px; color:#fff; font-weight:500; }
  .tag.meta{ background:var(--paper); color:var(--muted); border:1px solid var(--line); }
  .tag.status-want{ background:transparent; color:var(--accent-ink); border:1px dashed #D9A94A; }
  .tag.status-rep{ background:#FBEFD2; color:var(--accent-ink); }
  .dish{ font-size:13.5px; font-weight:500; }
  .memo{ font-size:13px; color:var(--muted); margin-top:3px; line-height:1.5; }
  .card-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:12px; color:var(--muted); }
  .card-foot a{ color:var(--accent-ink); text-decoration:none; font-weight:500; }
  .card-foot a:hover{ text-decoration:underline; }

  .empty{ text-align:center; color:var(--muted); padding:40px 16px; font-size:14px; line-height:1.7; }

  .leaflet-popup-content{ font-family:inherit; margin:10px 12px; }
  .pop-name{ font-family:"Zen Maru Gothic",sans-serif; font-weight:700; font-size:15px; }
  .pop-meta{ font-size:12px; color:var(--muted); margin-top:3px; }

  @media (max-width:820px){
    .seg{ display:flex; }
    #list{ flex:1 1 auto; border-right:0; }
    #map{ flex:1 1 auto; }
    body.view-map #list{ display:none; }
    body.view-list #map{ display:none; }
    .brand .sub{ display:none; }
  }
  @media (prefers-reduced-motion:reduce){ *{ transition:none !important; } }
</style>
</head>
<body class="view-list">

<header>
  <div class="bar">
    <div class="brand">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <path d="M5 15h22a11 11 0 0 1-22 0Z" fill="#F2B441"/>
        <path d="M5 15h22" stroke="#2A2621" stroke-width="1.6"/>
        <path d="M13 8.5c0-1.5 1-2.5 1-3.5M16 8c0-1.7 1-2.7 1-4M19 8.5c0-1.3 .9-2.2 .9-3.3" stroke="#B23A48" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M3 15h26" stroke="#2A2621" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div>
        <h1>神谷町グルメマップ</h1>
        <div class="sub">お昼どこ行く？ 地図と一覧でさっと決める</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn" id="reloadBtn" title="最新の情報に更新">更新</button>
      <a class="btn primary" id="addBtn" href="#" target="_blank" rel="noopener" style="display:none">＋ お店を追加</a>
    </div>
  </div>

  <div class="controls">
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/>
      </svg>
      <input id="q" type="search" placeholder="店名・メニュー・メモで検索" aria-label="検索" />
    </label>
    <div class="chips" id="genreChips" role="group" aria-label="ジャンルで絞り込み"></div>
  </div>

  <div class="seg" role="group" aria-label="表示切替">
    <button id="segList" aria-pressed="true">一覧</button>
    <button id="segMap"  aria-pressed="false">地図</button>
  </div>
</header>

<main>
  <section id="list" aria-label="お店の一覧">
    <div class="count" id="count"></div>
    <div id="cards"><div class="empty">読み込み中…</div></div>
  </section>
  <div id="map" aria-label="地図"></div>
</main>

<script>
  const $ = s => document.querySelector(s);
  let PLACES = [];
  let markers = [];
  let activeGenres = new Set();
  let selected = -1;

  // ジャンル→色（未登録は文字から自動で割り当て）
  function colorOf(g){
    if (GENRE_COLORS[g]) return GENRE_COLORS[g];
    let h = 0; for (const ch of String(g)) h = (h*31 + ch.charCodeAt(0)) >>> 0;
    return PALETTE[h % PALETTE.length];
  }

  // 地図（先に用意しておく）
  const map = L.map('map', { zoomControl:true }).setView([35.681, 139.767], 14);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19, attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  // ボタン配線
  $('#reloadBtn').onclick = () => location.reload();
  if (FORM_URL){ const a=$('#addBtn'); a.href=FORM_URL; a.style.display='inline-flex'; }

  // ---- データ取得 ----
  (async function boot(){
    try {
      const data = CSV_URL ? await loadFromCSV(CSV_URL) : SAMPLE_PLACES.slice();
      init(data);
    } catch (e){
      console.error(e);
      $('#cards').innerHTML =
        '<div class="empty">データを読み込めませんでした。<br>スプレッドシートの「ウェブに公開(CSV)」設定とURLを確認してください。</div>';
    }
  })();

  async function loadFromCSV(url){
    const res = await fetch(url + (url.includes('?')?'&':'?') + '_=' + Date.now());
    if (!res.ok) throw new Error('CSV fetch failed: ' + res.status);
    const rows = parseCSV(await res.text());
    if (rows.length < 2) return [];
    const head = rows[0].map(h => h.trim());
    const col = kw => head.findIndex(h => h.includes(kw));
    const iName=col('店名'), iGenre=col('ジャンル'), iCoord=col('緯度'),
          iBudget=col('予算'), iWalk=col('徒歩'), iDish=col('メニュー'),
          iRate=col('評価'), iStatus=col('ステータス'), iMemo=col('メモ'),
          iUrl=col('リンク'), iBy=col('登録');
    const out = [];
    for (let r=1; r<rows.length; r++){
      const row = rows[r]; if (!row || !row.join('').trim()) continue;
      const coord = (get(row,iCoord)).split(',').map(s => parseFloat(s.trim()));
      const lat = coord[0], lng = coord[1];
      if (!isFinite(lat) || !isFinite(lng)) continue; // 座標が無い行は地図に出せないのでスキップ
      out.push({
        name:get(row,iName), genre:get(row,iGenre) || 'その他',
        lat, lng, budget:get(row,iBudget), walk:get(row,iWalk),
        dish:get(row,iDish), rating:parseInt(get(row,iRate),10) || 0,
        status:get(row,iStatus), memo:get(row,iMemo), url:get(row,iUrl), by:get(row,iBy),
      });
    }
    return out;
  }
  const get = (row,i) => (i>=0 && row[i]!=null) ? String(row[i]).trim() : '';

  // 素朴だが正しいCSVパーサ（引用符・カンマ・改行に対応）
  function parseCSV(text){
    const rows=[]; let row=[], field='', inQ=false;
    for (let i=0;i<text.length;i++){
      const c=text[i];
      if (inQ){
        if (c==='"'){ if (text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
        else field+=c;
      } else {
        if (c==='"') inQ=true;
        else if (c===',') { row.push(field); field=''; }
        else if (c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else if (c!=='\r') field+=c;
      }
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }
    return rows;
  }

  // ---- 初期化（データが揃ってから）----
  function init(places){
    PLACES = places;

    markers = PLACES.map((p, i) => {
      const m = L.circleMarker([p.lat, p.lng], { radius:9, weight:2, color:'#fff', fillColor:colorOf(p.genre), fillOpacity:1 });
      m.bindPopup(
        '<div class="pop-name">'+esc(p.name)+'</div>'+
        '<div class="pop-meta">'+esc(p.genre)+'・'+esc(p.budget)+'円・徒歩'+esc(p.walk)+'分</div>'+
        '<div class="pop-meta">'+esc(p.dish)+'</div>'
      );
      m.on('click', () => select(i, false));
      m.addTo(map);
      return m;
    });
    if (markers.length) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.25));

    const chipBox = $('#genreChips'); chipBox.innerHTML='';
    [...new Set(PLACES.map(p => p.genre))].forEach(g => {
      const b = document.createElement('button');
      b.className='chip'; b.setAttribute('aria-pressed','false');
      b.innerHTML = '<span class="dot" style="background:'+colorOf(g)+'"></span>'+esc(g);
      b.onclick = () => {
        activeGenres.has(g) ? activeGenres.delete(g) : activeGenres.add(g);
        b.setAttribute('aria-pressed', activeGenres.has(g)); render();
      };
      chipBox.appendChild(b);
    });

    render();
  }

  function render(){
    const q = $('#q').value.trim().toLowerCase();
    const cards = $('#cards'); cards.innerHTML=''; let shown=0;

    PLACES.forEach((p, i) => {
      const okGenre = activeGenres.size===0 || activeGenres.has(p.genre);
      const hay = (p.name+' '+p.dish+' '+p.memo+' '+p.genre).toLowerCase();
      const okText = !q || hay.includes(q);
      const visible = okGenre && okText;
      markers[i].setStyle({ opacity:visible?1:0, fillOpacity:visible?1:0 });
      if (!visible) return; shown++;

      const rate = Math.max(0, Math.min(5, p.rating|0));
      const stars = '★'.repeat(rate) + '☆'.repeat(5-rate);
      const statusCls = p.status==='リピート' ? 'status-rep' : 'status-want';
      const card = document.createElement('div');
      card.className = 'card' + (i===selected?' selected':'');
      card.tabIndex = 0;
      card.innerHTML =
        '<div class="card-top"><h3>'+esc(p.name)+'</h3><span class="stars">'+stars+'</span></div>'+
        '<div class="tags">'+
          '<span class="tag" style="background:'+colorOf(p.genre)+'">'+esc(p.genre)+'</span>'+
          (p.status?'<span class="tag '+statusCls+'">'+esc(p.status)+'</span>':'')+
          (p.budget?'<span class="tag meta">'+esc(p.budget)+'円</span>':'')+
          (p.walk?'<span class="tag meta">徒歩'+esc(p.walk)+'分</span>':'')+
        '</div>'+
        (p.dish?'<div class="dish">'+esc(p.dish)+'</div>':'')+
        (p.memo?'<div class="memo">'+esc(p.memo)+'</div>':'')+
        '<div class="card-foot"><span>登録：'+esc(p.by||'—')+'</span>'+
          (p.url?'<a href="'+esc(p.url)+'" target="_blank" rel="noopener">リンク ↗</a>':'')+
        '</div>';
      const go = () => select(i, true);
      card.onclick = go;
      card.onkeydown = e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } };
      cards.appendChild(card);
    });

    $('#count').textContent = shown + ' 件のお店';
    if (shown===0)
      cards.innerHTML = '<div class="empty">条件に合うお店がありません。<br>検索や絞り込みを変えてみてください。</div>';
  }

  function select(i, fromCard){
    selected = i; render();
    const p = PLACES[i];
    map.setView([p.lat,p.lng], Math.max(map.getZoom(),16), { animate:true });
    markers[i].openPopup();
    if (fromCard && window.matchMedia('(max-width:820px)').matches) showMap();
    if (!fromCard){
      const el = [...document.querySelectorAll('.card')].find(c => c.querySelector('h3')?.textContent===p.name);
      el?.scrollIntoView({ block:'nearest', behavior:'smooth' });
    }
  }

  function showList(){ document.body.classList.add('view-list'); document.body.classList.remove('view-map');
    $('#segList').setAttribute('aria-pressed','true'); $('#segMap').setAttribute('aria-pressed','false'); }
  function showMap(){ document.body.classList.add('view-map'); document.body.classList.remove('view-list');
    $('#segMap').setAttribute('aria-pressed','true'); $('#segList').setAttribute('aria-pressed','false');
    setTimeout(() => map.invalidateSize(), 60); }
  $('#segList').onclick = showList;
  $('#segMap').onclick  = showMap;

  $('#q').addEventListener('input', render);
  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
