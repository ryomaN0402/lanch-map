<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>神谷町グルメマップ</title>

<!-- Leaflet (地図ライブラリ / 無料・APIキー不要) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<!-- =========================================================
     ★ 設定はここだけ ★
     1) CSV_URL … Googleスプレッドシートを「ウェブに公開(CSV)」したURL
     2) FORM_URL … 「お店を追加」ボタンから開くGoogleフォームのURL
     3) SITE_SHA256 … 閲覧パスワードのSHA-256ハッシュ（空なら誰でも閲覧可）
        設定方法: このページを開いて F12 → Console で makeHash("好きなパス") を実行し、
        表示された64文字をここに貼り付ける。
        ※注意: これはJS側の簡易ゲートです。ログインは求められ、パスワードは
          漏れませんが、地図データ自体はソース/開発者ツールからは見えます。
     ========================================================= -->
<script>
const CSV_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThmZqweEfqFTZs0Z8FrEpcfTxObjpxdoLdWq77mnuU-MkCUvDYOq77DQnb7zbl2f-GhAMSpNHOOhRp/pub?gid=1883553897&single=true&output=csv";
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSe-X8p2z_JgBws5-YAcp_zOEeCfD1zAx85aeiQIjJf-IRwSIQ/viewform";
const SITE_SHA256 = "2ce96cfd1fe2ad80497ef1b4bc57f5ba296770983715479dd2829062158878c5";  // 空=誰でも閲覧可 / makeHash("パス")で作った値を入れると閲覧ロック

// 本社の位置を地図に表示したいときに設定（空なら非表示）。
// 緯度・経度の調べ方: Googleマップで本社を右クリック → 一番上に出る数字をコピー
const OFFICE_NAME = "本社";
const OFFICE_LAT  = 35.66524270210621;  // 例: 35.6640
const OFFICE_LNG  = 139.74537491009713;  // 例: 139.7460

// ジャンルの色（ここに無いジャンルは自動で色が割り当てられます）
const GENRE_COLORS = {
  "和食系":"#C4553D", "アジア・エスニック系":"#E0972C",
  "洋食系":"#3F6E9C", "中華系":"#B23A48", "その他":"#B07A56"
};
const PALETTE = ["#7A6CA8","#2F8F9D","#C77B9E","#5E8C3A","#B5652F","#4A72B0"];

// CSV未設定のときに表示されるサンプル
const SAMPLE_PLACES = [
  { name:"麺屋 こもれび", genre:"ラーメン", lat:35.6870, lng:139.7640, budget:"〜1000", walk:3, dish:"醤油そば", rating:4, status:"リピート", by:"佐藤", memo:"昼は行列。11:30前が狙い目。", url:"" },
  { name:"定食 あおば", genre:"和食", lat:35.6855, lng:139.7665, budget:"〜1000", walk:5, dish:"日替わり定食", rating:5, status:"リピート", by:"田中", memo:"ボリュームすごい。ご飯おかわり無料。", url:"" },
  { name:"スパイスラボ", genre:"カレー", lat:35.6885, lng:139.7625, budget:"〜1200", walk:6, dish:"2種盛りカレー", rating:4, status:"行きたい", by:"鈴木", memo:"辛さ選べる。テイクアウト可。", url:"" },
  { name:"Café Lumo", genre:"カフェ", lat:35.6848, lng:139.7630, budget:"〜1500", walk:4, dish:"キッシュランチ", rating:3, status:"リピート", by:"山本", memo:"静かで打ち合わせ向き。", url:"" },
  { name:"洋食 ポルト", genre:"洋食", lat:35.6875, lng:139.7680, budget:"〜1500", walk:8, dish:"オムライス", rating:4, status:"行きたい", by:"高橋", memo:"デミグラスが濃厚。", url:"" },
  { name:"大衆中華 福龍", genre:"中華", lat:35.6860, lng:139.7610, budget:"〜1000", walk:7, dish:"半チャンラーメン", rating:4, status:"リピート", by:"伊藤", memo:"安い・早い。混む。", url:"" },
];
</script>

<style>
  :root{
    --paper:#FBF8F1; --panel:#FFFFFF; --ink:#2A2621; --muted:#7A736A;
    --line:#EAE3D6; --accent:#F2B441; --accent-ink:#7A5410;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:"Zen Kaku Gothic New", system-ui, sans-serif;
    color:var(--ink); background:var(--paper);
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  h1,h2,h3{ font-family:"Zen Maru Gothic", system-ui, sans-serif; margin:0; }

  header{ padding:14px 16px 10px; border-bottom:1px solid var(--line); background:var(--panel); z-index:5; flex:0 0 auto; }
  .bar{ display:flex; align-items:center; gap:10px; justify-content:space-between; }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .brand h1{ font-size:20px; font-weight:700; letter-spacing:.02em; white-space:nowrap; }
  .brand .sub{ font-size:12px; color:var(--muted); margin-top:2px; }
  .actions{ display:flex; gap:8px; flex:0 0 auto; }
  .btn{ font:inherit; font-size:13px; font-weight:500; cursor:pointer; border-radius:9px;
    padding:8px 12px; border:1px solid var(--line); background:var(--panel); color:var(--ink);
    text-decoration:none; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn.primary{ background:var(--accent); border-color:var(--accent); color:#3A2A08; font-weight:700; }
  .btn:hover{ box-shadow:0 2px 6px rgba(42,38,33,.08); }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .controls{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:12px; }
  .search{ flex:1 1 200px; min-width:150px; display:flex; align-items:center; gap:8px;
    background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:8px 12px; }
  .search input{ border:0; background:transparent; outline:none; width:100%; font:inherit; color:var(--ink); }
  .search svg{ flex:0 0 auto; color:var(--muted); }

  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ font:inherit; font-size:13px; cursor:pointer; user-select:none; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); padding:6px 11px; border-radius:999px;
    display:inline-flex; align-items:center; gap:6px; transition:background .15s, border-color .15s, transform .05s; }
  .chip .dot{ width:9px; height:9px; border-radius:50%; }
  .chip[aria-pressed="true"]{ border-color:var(--ink); background:#2A2621; color:#fff; }
  .chip:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .chip:active{ transform:scale(.97); }

  .rating-filter{ display:flex; align-items:center; gap:6px; border:1px solid var(--line); background:var(--panel);
    border-radius:999px; padding:6px 11px; }
  .rating-filter .rf-label{ font-size:12px; color:var(--muted); }
  .rating-filter button{ border:0; background:transparent; cursor:pointer; font-size:15px; line-height:1; padding:2px;
    color:#D8CFC0; }
  .rating-filter button.active{ color:var(--accent-ink); }
  .rating-filter button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  .rating-filter .rf-clear{ font-size:12px; color:var(--muted); text-decoration:underline; cursor:pointer; margin-left:2px; }
  .rating-filter .rf-clear[hidden]{ display:none; }

  /* 使い方ツアー */
  .tour-overlay{ position:fixed; inset:0; z-index:4000; pointer-events:none; }
  .tour-overlay[hidden]{ display:none; }
  .tour-ring{ position:absolute; border:3px solid var(--accent); border-radius:12px;
    box-shadow:0 0 0 4000px rgba(42,38,33,.55), 0 0 0 6px rgba(242,180,65,.35);
    transition:top .25s, left .25s, width .25s, height .25s; pointer-events:none; }
  .tour-tip{ position:absolute; width:280px; max-width:calc(100vw - 24px); background:var(--panel); border-radius:14px; padding:16px;
    box-shadow:0 14px 40px rgba(42,38,33,.3); pointer-events:auto; transition:top .25s, left .25s; }
  .tour-tip .tour-step{ font-size:11px; color:var(--muted); font-weight:700; letter-spacing:.05em; }
  .tour-tip p{ font-size:13.5px; line-height:1.6; margin:6px 0 12px; }
  .tour-actions{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .tour-actions .btn{ padding:7px 12px; font-size:12.5px; }
  .tour-skip{ font-size:12px; color:var(--muted); text-decoration:underline; cursor:pointer; background:none; border:0; padding:0; font-family:inherit; }

  .sortbox{ display:flex; align-items:center; gap:6px; }
  .sortbox label{ font-size:12px; color:var(--muted); white-space:nowrap; }
  .sortbox select{ font:inherit; font-size:13px; border:1px solid var(--line); background:var(--panel); color:var(--ink);
    border-radius:999px; padding:6px 11px; cursor:pointer; }
  .sortbox select:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .seg{ display:none; gap:4px; margin-top:12px; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:4px; }
  .seg button{ flex:1; font:inherit; font-weight:500; padding:8px; border:0; border-radius:7px; background:transparent; color:var(--muted); cursor:pointer; }

  main{ flex:1 1 auto; display:flex; min-height:0; }
  #list{ flex:0 0 380px; overflow-y:auto; padding:12px; background:var(--paper); border-right:1px solid var(--line); }
  .count{ font-size:12px; color:var(--muted); padding:2px 4px 10px; }
  #map{ flex:1 1 auto; min-height:0; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 13px; margin-bottom:10px;
    cursor:pointer; transition:border-color .15s, box-shadow .15s, transform .05s; }
  .card:hover{ box-shadow:0 3px 10px rgba(42,38,33,.07); }
  .card:active{ transform:scale(.995); }
  .card.selected{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(242,180,65,.28); }
  .card:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .card-top{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  .card h3{ font-size:16px; font-weight:700; }
  .stars{ font-size:13px; color:var(--accent-ink); letter-spacing:1px; white-space:nowrap; }
  .tags{ display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 6px; }
  .tag{ font-size:12px; padding:2px 9px; border-radius:999px; color:#fff; font-weight:500; }
  .tag.meta{ background:var(--paper); color:var(--muted); border:1px solid var(--line); }
  .dish{ font-size:13.5px; font-weight:500; }
  .memo{ font-size:13px; color:var(--muted); margin-top:3px; line-height:1.5; }
  .field-label{ color:var(--accent-ink); font-weight:700; }
  .card-foot{ display:flex; justify-content:flex-end; align-items:center; margin-top:8px; font-size:12px; }
  .card-foot a{ color:var(--accent-ink); text-decoration:none; font-weight:500; }
  .card-foot a:hover{ text-decoration:underline; }

  .empty{ text-align:center; color:var(--muted); padding:40px 16px; font-size:14px; line-height:1.7; }

  .leaflet-popup-content{ font-family:inherit; margin:10px 12px; }
  .pop-name{ font-family:"Zen Maru Gothic",sans-serif; font-weight:700; font-size:15px; }
  .pop-meta{ font-size:12px; color:var(--muted); margin-top:3px; }

  /* 本社マーカー */
  .office-pin{ display:flex; align-items:center; justify-content:center; width:30px; height:30px;
    background:var(--ink); border:3px solid #fff; border-radius:50% 50% 50% 0; transform:rotate(-45deg);
    box-shadow:0 2px 6px rgba(0,0,0,.35); }
  .office-pin span{ transform:rotate(45deg); font-size:14px; }

  /* ログイン画面（全面をおおう） */
  .login{ position:fixed; inset:0; background:var(--paper); display:flex; align-items:center; justify-content:center; padding:20px; z-index:2000; }
  .login[hidden]{ display:none; }
  .login-box{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:26px 24px; width:100%; max-width:340px; box-shadow:0 14px 44px rgba(42,38,33,.14); text-align:center; }
  .login-brand{ display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:4px; }
  .login-brand h1{ font-size:19px; font-weight:700; }
  .login-desc{ font-size:13px; color:var(--muted); margin:6px 0 16px; }
  #pw{ width:100%; font:inherit; padding:11px 13px; border:1px solid var(--line); border-radius:10px; background:var(--paper); outline:none; text-align:center; }
  #pw:focus{ border-color:var(--accent); }
  .pw-err{ color:#B23A48; font-size:13px; margin-top:8px; }
  .pw-err[hidden]{ display:none; }

  @media (max-width:820px){
    .seg{ display:flex; }
    #list{ flex:1 1 auto; border-right:0; }
    #map{ flex:1 1 auto; }
    body.view-map #list{ display:none; }
    body.view-list #map{ display:none; }
    .brand .sub{ display:none; }
    .controls{ row-gap:10px; }
    .sortbox{ width:100%; }
    .sortbox select{ flex:1; }
    .rating-filter{ width:100%; justify-content:space-between; }
    .rating-filter button{ font-size:19px; padding:4px 3px; }

    header{ padding:12px 14px 8px; }
    .bar{ flex-wrap:wrap; row-gap:8px; }
    .brand h1{ font-size:18px; }

  @media (max-width:380px){
    .brand h1{ font-size:16.5px; }
    .btn{ padding:8px 10px; font-size:12.5px; }
  }
  .add-short{ display:none; }
  @media (prefers-reduced-motion:reduce){ *{ transition:none !important; } }
</style>

<script>
  const $ = s => document.querySelector(s);
  let PLACES = [];
  let markers = [];
  let activeGenres = new Set();
  let selected = -1;
  let map;
  let minRating = 0;
  let sortKey = 'default';

  // ジャンル→色（未登録は文字から自動で割り当て）
  function colorOf(g){
    if (GENRE_COLORS[g]) return GENRE_COLORS[g];
    let h = 0; for (const ch of String(g)) h = (h*31 + ch.charCodeAt(0)) >>> 0;
    return PALETTE[h % PALETTE.length];
  }

  // ハッシュ計算（ログイン照合＆makeHash用）
  async function sha256(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
  }
  window.makeHash = async code => { const h = await sha256(code); console.log(h); return h; };

  // ---- ログイン ----
  const login = $('#login');
  const AUTH_KEY = 'lunchmap_auth_ok'; // タブを閉じるまで有効（sessionStorage）
  async function tryLogin(){
    const h = await sha256($('#pw').value.trim());
    if (h === SITE_SHA256){
      login.hidden = true;
      try { sessionStorage.setItem(AUTH_KEY, '1'); } catch(e){ /* プレビュー等で使えない環境は無視 */ }
      boot();
    } else { $('#pwErr').hidden = false; $('#pw').select(); }
  }
  let alreadyAuthed = false;
  try { alreadyAuthed = sessionStorage.getItem(AUTH_KEY) === '1'; } catch(e){ /* 無視 */ }

  if (!SITE_SHA256 || alreadyAuthed){ boot(); }  // パス未設定 or 同タブ内で認証済みなら再入力不要
  else {
    login.hidden = false;
    $('#pwOk').onclick = tryLogin;
    $('#pw').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });
    $('#pw').focus();
  }

  // ---- 本体起動（ログイン後 or パス未設定時）----
  async function boot(){
    map = L.map('map', { zoomControl:true }).setView([35.681, 139.767], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom:20, subdomains:'abcd',
      attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);

    // 本社マーカー（座標が設定されていれば表示）
    if (OFFICE_LAT != null && OFFICE_LNG != null){
      const officeIcon = L.divIcon({
        className:'', html:'<div class="office-pin"><span>🏢</span></div>',
        iconSize:[30,30], iconAnchor:[15,29], popupAnchor:[0,-26]
      });
      L.marker([OFFICE_LAT, OFFICE_LNG], { icon:officeIcon, zIndexOffset:1000 })
        .bindPopup('<div class="pop-name">'+esc(OFFICE_NAME)+'</div>')
        .addTo(map);
    }

    $('#reloadBtn').onclick = () => location.reload();
    if (FORM_URL){ const a=$('#addBtn'); a.href=FORM_URL; a.style.display='inline-flex'; }
    $('#q').addEventListener('input', render);
    $('#segList').onclick = showList;
    $('#segMap').onclick  = showMap;

    // 評価フィルタ（★ボタンをクリックで「その数以上」に設定。同じ星を再クリックで解除）
    const rfButtons = [...document.querySelectorAll('.rating-filter button')];
    function updateRfButtons(){
      rfButtons.forEach(b => b.classList.toggle('active', Number(b.dataset.r) <= minRating));
      $('#rfClear').hidden = minRating === 0;
    }
    rfButtons.forEach(b => {
      b.onclick = () => {
        const r = Number(b.dataset.r);
        minRating = (minRating === r) ? 0 : r;
        updateRfButtons(); render();
      };
    });
    $('#rfClear').onclick = () => { minRating = 0; updateRfButtons(); render(); };

    // 並び替え
    $('#sortSel').addEventListener('change', e => { sortKey = e.target.value; render(); });

    try {
      const data = CSV_URL ? await loadFromCSV(CSV_URL) : SAMPLE_PLACES.slice();
      init(data);
    } catch (e){
      console.error(e);
      $('#cards').innerHTML =
        '<div class="empty">データを読み込めませんでした。<br>スプレッドシートの「ウェブに公開(CSV)」設定とURLを確認してください。</div>';
    }
  }

  async function loadFromCSV(url){
    const res = await fetch(url + (url.includes('?')?'&':'?') + '_=' + Date.now());
    if (!res.ok) throw new Error('CSV fetch failed: ' + res.status);
    const rows = parseCSV(await res.text());
    if (rows.length < 2) return [];
    const head = rows[0].map(h => h.trim());
    const col = kw => head.findIndex(h => h.includes(kw));
    const iName=col('店名'), iGenre=col('ジャンル'), iCoord=col('緯度'),
          iBudget=col('予算'), iWalk=col('徒歩'), iDish=col('メニュー'),
          iRate=col('評価'), iStatus=col('ステータス'), iMemo=col('メモ'),
          iUrl=col('リンク'), iBy=col('登録');
    const out = [];
    for (let r=1; r<rows.length; r++){
      const row = rows[r]; if (!row || !row.join('').trim()) continue;
      const coord = (get(row,iCoord)).split(',').map(s => parseFloat(s.trim()));
      const lat = coord[0], lng = coord[1];
      if (!isFinite(lat) || !isFinite(lng)) continue; // 座標が無い行は地図に出せないのでスキップ
      out.push({
        name:get(row,iName), genre:get(row,iGenre) || 'その他',
        lat, lng, budget:get(row,iBudget), walk:get(row,iWalk),
        dish:get(row,iDish), rating:parseInt(get(row,iRate),10) || 0,
        status:get(row,iStatus), memo:get(row,iMemo), url:get(row,iUrl), by:get(row,iBy),
      });
    }
    return out;
  }
  const get = (row,i) => (i>=0 && row[i]!=null) ? String(row[i]).trim() : '';

  // 素朴だが正しいCSVパーサ（引用符・カンマ・改行に対応）
  function parseCSV(text){
    const rows=[]; let row=[], field='', inQ=false;
    for (let i=0;i<text.length;i++){
      const c=text[i];
      if (inQ){
        if (c==='"'){ if (text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
        else field+=c;
      } else {
        if (c==='"') inQ=true;
        else if (c===',') { row.push(field); field=''; }
        else if (c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else if (c!=='\r') field+=c;
      }
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }
    return rows;
  }

  // ---- 初期化（データが揃ってから）----
  function init(places){
    PLACES = places;

    markers = PLACES.map((p, i) => {
      const m = L.circleMarker([p.lat, p.lng], { radius:9, weight:2, color:'#fff', fillColor:colorOf(p.genre), fillOpacity:1 });
      m.bindPopup(
        '<div class="pop-name">'+esc(p.name)+'</div>'+
        '<div class="pop-meta">'+esc(p.genre)+'・'+esc(p.budget)+'円・徒歩'+esc(p.walk)+'分</div>'+
        (p.dish?'<div class="pop-meta"><span class="field-label">おすすめ：</span>'+esc(p.dish)+'</div>':'')
      );
      m.on('click', () => select(i, false));
      m.addTo(map);
      return m;
    });
    if (markers.length) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.25));

    const chipBox = $('#genreChips'); chipBox.innerHTML='';
    [...new Set(PLACES.map(p => p.genre))].forEach(g => {
      const b = document.createElement('button');
      b.className='chip'; b.setAttribute('aria-pressed','false');
      b.innerHTML = '<span class="dot" style="background:'+colorOf(g)+'"></span>'+esc(g);
      b.onclick = () => {
        activeGenres.has(g) ? activeGenres.delete(g) : activeGenres.add(g);
        b.setAttribute('aria-pressed', activeGenres.has(g)); render();
      };
      chipBox.appendChild(b);
    });

    render();
  }

  function budgetNum(b){
    const m = String(b ?? '').match(/\d+/);
    return m ? parseInt(m[0], 10) : Infinity;
  }

  function render(){
    const q = $('#q').value.trim().toLowerCase();
    const cards = $('#cards'); cards.innerHTML=''; let shown=0;

    // 表示対象のインデックスを判定（絞り込み）
    const visibleIdx = PLACES.map((p,i) => i).filter(i => {
      const p = PLACES[i];
      const okGenre = activeGenres.size===0 || activeGenres.has(p.genre);
      const hay = (p.name+' '+p.dish+' '+p.memo+' '+p.genre).toLowerCase();
      const okText = !q || hay.includes(q);
      const okRating = (p.rating|0) >= minRating;
      return okGenre && okText && okRating;
    });

    // 並び替え（表示順のみ。マーカーの対応関係は崩さない）
    const sorters = {
      default:    (a,b) => 0,
      rating_desc:(a,b) => (PLACES[b].rating|0) - (PLACES[a].rating|0),
      walk_asc:   (a,b) => (parseInt(PLACES[a].walk,10)||Infinity) - (parseInt(PLACES[b].walk,10)||Infinity),
      budget_asc: (a,b) => budgetNum(PLACES[a].budget) - budgetNum(PLACES[b].budget),
    };
    const order = visibleIdx.slice().sort(sorters[sortKey] || sorters.default);
    const visibleSet = new Set(visibleIdx);

    // マーカーの表示/非表示は全件走査で更新
    PLACES.forEach((p,i) => {
      const vis = visibleSet.has(i);
      markers[i].setStyle({ opacity:vis?1:0, fillOpacity:vis?1:0 });
    });

    order.forEach(i => {
      const p = PLACES[i]; shown++;
      const rate = Math.max(0, Math.min(5, p.rating|0));
      const stars = '★'.repeat(rate) + '☆'.repeat(5-rate);
      const card = document.createElement('div');
      card.className = 'card' + (i===selected?' selected':'');
      card.tabIndex = 0;
      card.innerHTML =
        '<div class="card-top"><h3>'+esc(p.name)+'</h3><span class="stars">'+stars+'</span></div>'+
        '<div class="tags">'+
          '<span class="tag" style="background:'+colorOf(p.genre)+'">'+esc(p.genre)+'</span>'+
          (p.budget?'<span class="tag meta">'+esc(p.budget)+'円</span>':'')+
          (p.walk?'<span class="tag meta">徒歩'+esc(p.walk)+'分</span>':'')+
        '</div>'+
        (p.dish?'<div class="dish"><span class="field-label">おすすめ：</span>'+esc(p.dish)+'</div>':'')+
        (p.memo?'<div class="memo"><span class="field-label">コメント：</span>'+esc(p.memo)+'</div>':'')+
        (p.url?'<div class="card-foot"><a href="'+esc(p.url)+'" target="_blank" rel="noopener">リンク ↗</a></div>':'');
      const go = () => select(i, true);
      card.onclick = go;
      card.onkeydown = e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } };
      cards.appendChild(card);
    });

    $('#count').textContent = shown + ' 件のお店';
    if (shown===0)
      cards.innerHTML = '<div class="empty">条件に合うお店がありません。<br>検索や絞り込みを変えてみてください。</div>';
  }

  function select(i, fromCard){
    selected = i; render();
    const p = PLACES[i];
    map.setView([p.lat,p.lng], Math.max(map.getZoom(),16), { animate:true });
    markers[i].openPopup();
    if (fromCard && window.matchMedia('(max-width:820px)').matches) showMap();
    if (!fromCard){
      const el = [...document.querySelectorAll('.card')].find(c => c.querySelector('h3')?.textContent===p.name);
      el?.scrollIntoView({ block:'nearest', behavior:'smooth' });
    }
  }

  function showList(){ document.body.classList.add('view-list'); document.body.classList.remove('view-map');
    $('#segList').setAttribute('aria-pressed','true'); $('#segMap').setAttribute('aria-pressed','false'); }
  function showMap(){ document.body.classList.add('view-map'); document.body.classList.remove('view-list');
    $('#segMap').setAttribute('aria-pressed','true'); $('#segList').setAttribute('aria-pressed','false');
    setTimeout(() => map.invalidateSize(), 60); }

  // ---- 使い方ツアー ----
  const TOUR_STEPS = [
    { sel:'#searchBox',      text:'ここで店名・おすすめメニュー・コメントの中からキーワード検索できます。' },
    { sel:'#genreChips',     text:'ジャンルのタグをタップして絞り込めます（複数選択可）。右にある★は、その評価以上のお店だけを表示するフィルタです。もう一度押すか「クリア」で解除できます。' },
    { sel:'#sortBox',        text:'並び替えで「評価が高い順」「徒歩が短い順」「予算が安い順」に切り替えられます。' },
    { sel:'#list',           text:'カードをタップすると、地図上の対応するピンにジャンプします。スマホでは下の「一覧／地図」ボタンで表示を切り替えられます。' },
    { sel:'#addBtn',         text:'行ったことのあるお店は「＋ お店を追加」から登録できます。フォームに入力すると、この地図に反映されます。' },
  ];
  let tourIndex = 0;
  const tourOverlay = $('#tourOverlay'), tourRing = $('#tourRing'), tourTip = $('#tourTip');

  function positionTour(){
    const step = TOUR_STEPS[tourIndex];
    const el = document.querySelector(step.sel);
    if (!el){ tourNext_(); return; } // 要素が無ければ次へスキップ
    const r = el.getBoundingClientRect();
    const pad = 8;
    const ringTop = Math.max(r.top - pad, 8);
    const ringLeft = Math.max(r.left - pad, 8);
    const ringW = Math.min(r.width + pad*2, window.innerWidth - 16);
    const ringH = r.height + pad*2;
    tourRing.style.top = ringTop + 'px';
    tourRing.style.left = ringLeft + 'px';
    tourRing.style.width = ringW + 'px';
    tourRing.style.height = ringH + 'px';

    $('#tourStepLabel').textContent = 'STEP ' + (tourIndex+1) + ' / ' + TOUR_STEPS.length;
    $('#tourText').textContent = step.text;

    // 吹き出しの位置：下に置けなければ上に置く。横は画面内に収める
    const tipW = Math.min(280, window.innerWidth - 24);
    let top = ringTop + ringH + 12;
    const spaceBelow = window.innerHeight - top;
    if (spaceBelow < 160){ top = Math.max(ringTop - 150, 8); }
    let left = Math.min(Math.max(ringLeft, 12), window.innerWidth - tipW - 12);
    tourTip.style.top = top + 'px';
    tourTip.style.left = left + 'px';

    $('#tourPrev').style.visibility = (tourIndex===0) ? 'hidden' : 'visible';
    $('#tourNext').textContent = (tourIndex === TOUR_STEPS.length-1) ? '完了' : '次へ';

    el.scrollIntoView({ block:'nearest', behavior:'smooth' });
  }
  function tourNext_(){
    if (tourIndex >= TOUR_STEPS.length-1){ endTour(); return; }
    tourIndex++; positionTour();
  }
  function startTour(){
    showList(); // カードが見える状態から開始
    tourIndex = 0;
    tourOverlay.hidden = false;
    setTimeout(positionTour, 50); // レイアウト確定を待つ
  }
  function endTour(){ tourOverlay.hidden = true; }

  $('#tourBtn').onclick = startTour;
  $('#tourNext').onclick = tourNext_;
  $('#tourPrev').onclick = () => { if (tourIndex>0){ tourIndex--; positionTour(); } };
  $('#tourSkip').onclick = endTour;
  window.addEventListener('resize', () => { if (!tourOverlay.hidden) positionTour(); });

  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
